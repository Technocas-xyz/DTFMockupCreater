services:
  app:
    build: .
    ports:
      - "8095:80"
    volumes:
      - garment-data:/var/www/html/api/garment-data
    environment:
      - DB_SCHEMA=dtf
    env_file:
      - /root/decoinks/backend/.env
    networks:
      - default
      - decoinks_central
    restart: unless-stopped

volumes:
  garment-data:

networks:
  decoinks_central:
    external: true
    name: decoinks_decoinks_net
